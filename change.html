<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>换水计算</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230a1628'/%3E%3Cpath d='M20 44 Q32 20 44 44' stroke='%2300d2ff' stroke-width='3' fill='none' stroke-linecap='round'/%3E%3Ccircle cx='32' cy='38' r='8' fill='%2300d2ff' opacity='.2' stroke='%2300d2ff' stroke-width='1.5'/%3E%3C/svg%3E">
<style>
:root{
  --bg:#0a1628;--card:#131d2f;--border:#1e2d45;--border2:#2a3a52;
  --text:#e0e6ed;--text2:#8ba3c7;--text3:#6b7a8d;--text4:#4a5a6d;--text5:#3a4a62;
  --input-bg:#0a1628;--hover:rgba(0,210,255,.03);--accent:#00d2ff;--accent2:#7b68ee;
  --warn:#ff6b6b;--shadow:rgba(0,0,0,.3);--card-hover-border:#1e3a5a;--card-hover-shadow:rgba(0,210,255,.04);
}
html.light{
  --bg:#f0f2f5;--card:#ffffff;--border:#dce0e6;--border2:#c5cbd3;
  --text:#111827;--text2:#374151;--text3:#4b5563;--text4:#6b7280;--text5:#9ca3af;
  --input-bg:#f7f8fa;--hover:rgba(0,120,200,.04);--accent:#0066cc;--accent2:#5b4ed4;
  --warn:#dc2626;--shadow:rgba(0,0,0,.10);--card-hover-border:#b0bec5;--card-hover-shadow:rgba(0,120,200,.08);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s}
.container{max-width:1080px;margin:0 auto;padding:20px 24px}

/* === Unified Nav === */
.top-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;gap:12px}
.nav-left{display:flex;align-items:center;gap:20px}
.nav-brand{font-size:15px;font-weight:700;color:var(--text);white-space:nowrap}
.nav-tabs{display:flex;gap:2px;align-items:center}
.nav-tab{padding:6px 14px;font-size:13px;font-weight:500;color:var(--text3);text-decoration:none;border-radius:6px;transition:all .2s;white-space:nowrap}
.nav-tab:hover{color:var(--text);background:var(--hover)}
.nav-tab.active{color:var(--accent);background:color-mix(in srgb,var(--accent) 8%,transparent);font-weight:600}
.nav-right{display:flex;align-items:center;gap:8px}
.theme-btn{background:none;border:1px solid var(--border);color:var(--text3);width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .3s}
.theme-btn:hover{border-color:var(--accent);color:var(--accent)}

@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.anim-in{animation:fadeUp .5s cubic-bezier(.22,1,.36,1) both}
.anim-d1{animation-delay:.08s}
.anim-d2{animation-delay:.16s}

.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;position:relative;transition:border-color .4s,box-shadow .4s,background .3s}
.card:hover{border-color:var(--card-hover-border);box-shadow:0 4px 24px var(--card-hover-shadow)}
.card+.card{margin-top:16px}
.card-title{font-size:14px;font-weight:600;color:var(--text2);margin-bottom:16px;display:flex;align-items:center;gap:6px}

/* === Calc Layout === */
.calc-section{margin-bottom:20px}
.calc-section:last-child{margin-bottom:0}
.sec-label{font-size:11px;color:var(--text4);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.input-row{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end}
.input-group{display:flex;flex-direction:column;gap:4px;flex:1;min-width:120px}
.input-group label{font-size:12px;color:var(--text3);font-weight:500}
.input-group label .unit{color:var(--text4);font-weight:400}
.input-group input{background:var(--input-bg);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:8px;font-size:14px;font-weight:500;outline:none;transition:border-color .3s,box-shadow .3s;text-align:center;width:100%}
.input-group input:focus{border-color:var(--accent);box-shadow:0 0 0 2px color-mix(in srgb,var(--accent) 10%,transparent)}

/* Result area */
.result-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:14px;padding:14px 16px;background:color-mix(in srgb,var(--accent) 3%,transparent);border:1px dashed color-mix(in srgb,var(--accent) 20%,transparent);border-radius:10px}
.result-item{flex:1;min-width:100px;text-align:center}
.result-item .r-label{font-size:11px;color:var(--text4);margin-bottom:4px}
.result-item .r-value{font-size:20px;font-weight:700;color:var(--accent)}
.result-item .r-value .r-unit{font-size:12px;font-weight:500;color:var(--text3);margin-left:2px}
.result-item .r-desc{font-size:10px;color:var(--text5);margin-top:2px}

/* Warn */
.result-warn{color:var(--warn) !important;font-size:13px !important;font-weight:600 !important}

/* Divider */
.sep{height:1px;background:var(--border);margin:18px 0}

/* Tip */
.tip{font-size:11px;color:var(--text4);line-height:1.6;margin-top:12px;padding:10px 12px;background:color-mix(in srgb,var(--accent) 2%,transparent);border-radius:8px;border:1px solid color-mix(in srgb,var(--accent) 8%,transparent)}
.tip strong{color:var(--text3)}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--card);border:1px solid var(--border);color:var(--accent);padding:10px 24px;border-radius:10px;font-size:13px;opacity:0;transition:all .4s cubic-bezier(.22,1,.36,1);pointer-events:none;z-index:999;box-shadow:0 8px 32px var(--shadow)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:600px){
  .container{padding:12px}
  .top-nav{flex-wrap:wrap}
  .nav-left{gap:12px}
  .input-row{flex-direction:column;gap:10px}
  .input-group{min-width:0}
  .result-row{flex-direction:column;gap:10px}
  .result-item{text-align:left;display:flex;align-items:center;gap:8px}
  .result-item .r-label{margin-bottom:0;min-width:60px}
}
</style>
</head>
<body>
<div class="container">
  <!-- Unified Navigation -->
  <div class="top-nav anim-in">
    <div class="nav-left">
      <span class="nav-brand">珊瑚监测</span>
      <div class="nav-tabs">
        <a class="nav-tab" href="water.html">💧 水质</a>
        <a class="nav-tab" href="light.html">🌈 光谱</a>
        <a class="nav-tab active" href="change.html">🔄 换水</a>
      </div>
    </div>
    <div class="nav-right">
      <button class="theme-btn" onclick="toggleTheme()" id="themeBtn" title="切换主题">☀️</button>
    </div>
  </div>

  <!-- 换水计算 -->
  <div class="card anim-in anim-d1">
    <div class="card-title">🔄 换水计算</div>

    <!-- 输入区 -->
    <div class="calc-section">
      <div class="sec-label">📝 填写参数</div>
      <div class="input-row">
        <div class="input-group">
          <label>换水量 <span class="unit">(L)</span></label>
          <input type="number" id="waterVolume" value="12" step="1" oninput="calc()">
        </div>
        <div class="input-group">
          <label>缸总水体 <span class="unit">(L)</span></label>
          <input type="number" id="tankTotal" value="70" step="1" oninput="calc()">
        </div>
        <div class="input-group">
          <label>盐度 <span class="unit">(‰)</span></label>
          <input type="number" id="salinity" value="36" step="0.5" oninput="calc()">
        </div>
      </div>
      <div class="input-row" style="margin-top:12px">
        <div class="input-group">
          <label>室内温度 <span class="unit">(°C)</span></label>
          <input type="number" id="roomTemp" value="25" step="0.5" oninput="calc()">
        </div>
        <div class="input-group">
          <label>加热器温差 <span class="unit">(°C)</span></label>
          <input type="number" id="heatDelta" value="2" step="0.5" oninput="calc()">
        </div>
        <div class="input-group">
          <label>目标温度 <span class="unit">(°C)</span></label>
          <input type="number" id="targetTemp" value="25" step="0.5" oninput="calc()">
        </div>
      </div>
    </div>

    <div class="sep"></div>

    <!-- 结果区 -->
    <div class="calc-section">
      <div class="sec-label">📊 计算结果</div>
      <div class="result-row">
        <div class="result-item">
          <div class="r-label">室温水</div>
          <div class="r-value" id="rRoom">-<span class="r-unit">L</span></div>
          <div class="r-desc">直接使用的RO水</div>
        </div>
        <div class="result-item">
          <div class="r-label">加热水</div>
          <div class="r-value" id="rHeat">-<span class="r-unit">L</span></div>
          <div class="r-desc">需加热器加热</div>
        </div>
        <div class="result-item">
          <div class="r-label">盐量</div>
          <div class="r-value" id="rSalt">-<span class="r-unit">g</span></div>
          <div class="r-desc">换水量 × 盐度</div>
        </div>
        <div class="result-item">
          <div class="r-label">换水比例</div>
          <div class="r-value" id="rRatio">-<span class="r-unit">%</span></div>
          <div class="r-desc">换水量 / 总水体</div>
        </div>
      </div>
    </div>

    <div class="tip">
      <strong>计算说明</strong><br>
      · 温度混合：室温水 + 加热水(室温+温差) 混合达到目标温度<br>
      · 盐量 = 换水量 × 盐度 ，换水比例 = 换水量 / 缸总水体<br>
      · 当室温 = 目标温度时，无需加热，全部使用室温水
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SK='reef_change_v1';
function _g(k){try{return localStorage.getItem(k)}catch(e){return null}}
function _s(k,v){try{localStorage.setItem(k,v)}catch(e){}}

let darkMode=false;
function loadTheme(){
  const t=_g('reef_theme');
  if(t==='dark'){darkMode=true;document.documentElement.classList.remove('light');}
  else{darkMode=false;}
  document.getElementById('themeBtn').textContent=darkMode?'🌙':'☀️';
}
function toggleTheme(){
  darkMode=!darkMode;
  document.documentElement.classList.toggle('light',!darkMode);
  document.getElementById('themeBtn').textContent=darkMode?'🌙':'☀️';
  _s('reef_theme',darkMode?'dark':'light');
}

function calc(){
  const vol=parseFloat(document.getElementById('waterVolume').value)||0;
  const tankTotal=parseFloat(document.getElementById('tankTotal').value)||70;
  const salinity=parseFloat(document.getElementById('salinity').value)||36;
  const roomT=parseFloat(document.getElementById('roomTemp').value)||25;
  const heatDelta=parseFloat(document.getElementById('heatDelta').value)||0;
  const targetT=parseFloat(document.getElementById('targetTemp').value)||25;

  const heatedT=roomT+heatDelta;
  let roomW,heatW;

  if(heatDelta<=0||targetT<=roomT){
    roomW=vol;heatW=0;
  }else if(targetT>heatedT){
    roomW=0;heatW=vol;
  }else{
    roomW=vol*(heatedT-targetT)/heatDelta;
    heatW=vol-roomW;
  }
  roomW=Math.max(0,Math.min(vol,roomW));
  heatW=Math.max(0,Math.min(vol,heatW));

  const salt=vol*salinity;
  const ratio=tankTotal>0?(vol/tankTotal*100):0;

  // Render
  const impossible=targetT>heatedT&&heatDelta>0;
  if(impossible){
    document.getElementById('rRoom').innerHTML='<span class="result-warn">⚠️ 温差不足</span>';
    document.getElementById('rHeat').innerHTML='<span class="result-warn">无法达到目标</span>';
  }else{
    document.getElementById('rRoom').innerHTML=(roomW%1===0?roomW:roomW.toFixed(1))+'<span class="r-unit">L</span>';
    document.getElementById('rHeat').innerHTML=(heatW%1===0?heatW:heatW.toFixed(1))+'<span class="r-unit">L</span>';
  }
  document.getElementById('rSalt').innerHTML=Math.round(salt)+'<span class="r-unit">g</span>';
  document.getElementById('rRatio').innerHTML=ratio.toFixed(1)+'<span class="r-unit">%</span>';

  saveInputs();
}

function saveInputs(){
  const ids=['waterVolume','tankTotal','salinity','roomTemp','heatDelta','targetTemp'];
  const d={};ids.forEach(id=>{d[id]=document.getElementById(id).value;});
  _s(SK,JSON.stringify(d));
}
function loadInputs(){
  const s=_g(SK);if(!s)return;
  try{const d=JSON.parse(s);for(const k in d){const el=document.getElementById(k);if(el)el.value=d[k];}}catch(e){}
}

document.addEventListener('DOMContentLoaded',function(){loadTheme();loadInputs();calc();});
</script>
</body>
</html>
